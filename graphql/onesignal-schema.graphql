}

# ---------------------------------------------------------------------------
# External user / alias types
# ---------------------------------------------------------------------------

"""
An external user identifier mapped to OneSignal subscriptions.
"""
type ExternalId {
  externalId: String!
  subscriptionIds: [String!]
  playerIds: [String!]
}

"""
A OneSignal user (User API) with aliases and subscriptions.
"""
type ExternalUser {
  onesignalId: ID!
  externalId: String
  aliases: JSON
  subscriptions: [Subscription!]
  properties: UserProperties
}

"""
Dynamic user properties stored in OneSignal's User API.
"""
type UserProperties {
  tags: JSON
  language: String
  timezone: String
  country: String
  lat: Float
  long: Float
  firstActive: DateTime
  lastActive: DateTime
  amountSpent: Float
  purchases: [Purchase!]
  sessionCount: Int
}

# ---------------------------------------------------------------------------
# Journey types
# ---------------------------------------------------------------------------

"""
A multi-step automated messaging journey.
"""
type Journey {
  id: ID!
  appId: String!
  name: String!
  status: JourneyStatus!
  createdAt: DateTime
  updatedAt: DateTime
  startedAt: DateTime
  stoppedAt: DateTime
}

"""
Full journey details including step configuration.
"""
type JourneyDetails {
  id: ID!
  appId: String!
  name: String!
  status: JourneyStatus!
  createdAt: DateTime
  updatedAt: DateTime
  startedAt: DateTime
  stoppedAt: DateTime
  steps: JSON
  entryFilters: [SegmentFilter!]
  exitFilters: [SegmentFilter!]
  conversionEvent: String
}

# ---------------------------------------------------------------------------
# API Key / Token types
# ---------------------------------------------------------------------------

"""
An API key associated with an app or organization.
"""
type APIKey {
  key: String!
  label: String
  createdAt: DateTime
  expiresAt: DateTime
  readOnly: Boolean
  allowedApps: [String!]
}

"""
An authentication token (e.g. REST API key, user-level key).
"""
type Token {
  value: String!
  type: String
  expiresAt: DateTime
}

# ---------------------------------------------------------------------------
# Webhook types
# ---------------------------------------------------------------------------

"""
A registered webhook endpoint for OneSignal events.
"""
type Webhook {
  id: ID!
  appId: String!
  url: String!
  events: [WebhookEventType!]!
  createdAt: DateTime
  updatedAt: DateTime
  enabled: Boolean!
}

"""
A webhook event payload received from OneSignal.
"""
type WebhookEvent {
  id: ID!
  type: WebhookEventType!
  appId: String!
  notificationId: String
  subscriptionId: String
  timestamp: DateTime!
  data: JSON
}

# ---------------------------------------------------------------------------
# Pagination wrapper
# ---------------------------------------------------------------------------

"""
Paginated list of notifications.
"""
type NotificationList {
  total: Int!
  offset: Int!
  limit: Int!
  notifications: [Notification!]!
}

"""
Paginated list of players.
"""
type PlayerList {
  total: Int!
  offset: Int!
  limit: Int!
  players: [Player!]!
}

"""
Paginated list of segments.
"""
type SegmentList {
  total: Int!
  segments: [Segment!]!
}

"""
Paginated list of subscriptions.
"""
type SubscriptionList {
  total: Int!
  offset: Int!
  subscriptions: [Subscription!]!
}

# ---------------------------------------------------------------------------
# Input types
# ---------------------------------------------------------------------------

input NotificationContentsInput {
  en: String
  ar: String
  de: String
  es: String
  fr: String
  it: String
  ja: String
  ko: String
  nl: String
  pt: String
  ru: String
  zh: String
  additionalLanguages: JSON
}

input SendNotificationInput {
  appId: String!
  type: NotificationType!
  contents: NotificationContentsInput
  headings: NotificationContentsInput
  url: String
  data: JSON
  includedSegments: [String!]
  excludedSegments: [String!]
  includePlayerIds: [String!]
  includeExternalUserIds: [String!]
  filters: [SegmentFilterInput!]
  sendAfter: DateTime
  ttl: Int
  priority: Int
  throttleRatePerMinute: Int
  templateId: String
  externalId: String
}

input SegmentFilterInput {
  field: SegmentFilterField!
  key: String
  relation: FilterOperator!
  value: String
  hours: Int
  operator: String
}

input CreateSegmentInput {
  name: String!
  filters: [SegmentFilterInput!]!
}

input UpdatePlayerInput {
  deviceType: PlayerType
  language: String
  tags: JSON
  lat: Float
  long: Float
  country: String
  testType: Int
  notificationTypes: Int
  appVersion: String
  timezone: Int
  sdkVersion: String
}

input CreatePlayerInput {
  appId: String!
  deviceType: PlayerType!
  identifier: String
  language: String
  timezone: Int
  appVersion: String
  deviceModel: String
  deviceOS: String
  adId: String
  testType: Int
  notificationTypes: Int
  tags: JSON
  lat: Float
  long: Float
}

input CreateWebhookInput {
  appId: String!
  url: String!
  events: [WebhookEventType!]!
}

input UpdateWebhookInput {
  url: String
  events: [WebhookEventType!]
  enabled: Boolean
}

input CreateTemplateInput {
  appId: String!
  name: String!
  type: TemplateType!
  contents: NotificationContentsInput
  headings: NotificationContentsInput
  url: String
  data: JSON
}

input UpdateAppInput {
  name: String
  gcmKey: String
  apnsEnv: String
  senderEmail: String
  senderName: String
}

# ---------------------------------------------------------------------------
# Root types
# ---------------------------------------------------------------------------

type Query {
  """Retrieve a single notification by ID."""
  notification(appId: String!, id: ID!): NotificationDetails

  """List notifications for an app with optional pagination."""
  notifications(appId: String!, limit: Int, offset: Int, kind: Int): NotificationList

  """Get a single registered player / device."""
  player(appId: String!, id: ID!): PlayerDetails

  """List all players for an app."""
  players(appId: String!, limit: Int, offset: Int): PlayerList

  """Get a single segment."""
  segment(appId: String!, id: ID!): SegmentDetails

  """List all segments for an app."""
  segments(appId: String!): SegmentList

  """Get a subscription by ID."""
  subscription(appId: String!, subscriptionId: ID!): SubscriptionDetails

  """List subscriptions for an external user."""
  subscriptionsByUser(appId: String!, externalId: String!): SubscriptionList

  """Get an app by ID."""
  app(id: ID!): AppDetails

  """List all apps in the organisation."""
  apps: [App!]!

  """Get a specific email message."""
  email(appId: String!, id: ID!): EmailDetails

  """Get an SMS notification."""
  smsNotification(appId: String!, id: ID!): SMSDetails

  """Get a template."""
  template(appId: String!, id: ID!): TemplateDetails

  """List templates for an app."""
  templates(appId: String!): [Template!]!

  """Get an external user and their subscriptions."""
  user(appId: String!, externalId: String!): ExternalUser

  """Get outcome results for an app."""
  outcomeResults(appId: String!, outcomeNames: [String!]!, outcomeTimeRange: String, platformChannelTypes: String, attributionType: OutcomeSessionType): [OutcomeResult!]!

  """List webhooks for an app."""
  webhooks(appId: String!): [Webhook!]!

  """Get a webhook by ID."""
  webhook(appId: String!, id: ID!): Webhook

  """Get a journey."""
  journey(appId: String!, id: ID!): JourneyDetails

  """List journeys for an app."""
  journeys(appId: String!): [Journey!]!
}

type Mutation {
  """Send a notification to one or more channels."""
  sendNotification(input: SendNotificationInput!): Notification!

  """Cancel a pending or queued notification."""
  cancelNotification(appId: String!, id: ID!): Boolean!

  """Create a new player / device registration."""
  createPlayer(input: CreatePlayerInput!): Player!

  """Update an existing player."""
  updatePlayer(appId: String!, id: ID!, input: UpdatePlayerInput!): Player!

  """Delete a player."""
  deletePlayer(appId: String!, id: ID!): Boolean!

  """Create a segment."""
  createSegment(appId: String!, input: CreateSegmentInput!): Segment!

  """Delete a segment."""
  deleteSegment(appId: String!, id: ID!): Boolean!

  """Create or update an external user alias."""
  upsertUser(appId: String!, externalId: String!, properties: JSON, subscriptions: JSON): ExternalUser!

  """Delete an external user."""
  deleteUser(appId: String!, externalId: String!): Boolean!

  """Create an app."""
  createApp(name: String!, platforms: [AppPlatformType!]): App!

  """Update an app's configuration."""
  updateApp(id: ID!, input: UpdateAppInput!): App!

  """Register a webhook."""
  createWebhook(input: CreateWebhookInput!): Webhook!

  """Update a webhook."""
  updateWebhook(appId: String!, id: ID!, input: UpdateWebhookInput!): Webhook!

  """Delete a webhook."""
  deleteWebhook(appId: String!, id: ID!): Boolean!

  """Create a template."""
  createTemplate(input: CreateTemplateInput!): Template!

  """Update a template."""
  updateTemplate(appId: String!, id: ID!, input: CreateTemplateInput!): Template!

  """Delete a template."""
  deleteTemplate(appId: String!, id: ID!): Boolean!

  """Export player CSV (returns job ID)."""
  exportPlayers(appId: String!, extraFields: [String!], segmentName: String): String!
}

type Subscription {
  """Stream delivery status updates for a notification."""
  notificationStatus(appId: String!, notificationId: ID!): Notification!

  """Stream incoming webhook events for an app."""
  webhookEvents(appId: String!, events: [WebhookEventType!]): WebhookEvent!
}
