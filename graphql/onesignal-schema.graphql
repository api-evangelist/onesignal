}

# ---------------------------------------------------------------------------
# Template types
# ---------------------------------------------------------------------------

"""
A reusable notification template.
"""
type Template {
  id: ID!
  appId: String!
  name: String!
  type: TemplateType!
  contents: NotificationContents
  headings: NotificationContents
  url: String
  data: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

"""
Full template details including revision history.
"""
type TemplateDetails {
  id: ID!
  appId: String!
  name: String!
  type: TemplateType!
  contents: NotificationContents
  headings: NotificationContents
  url: String
  data: JSON
  createdAt: DateTime
  updatedAt: DateTime
